name: Back End Check

on:
  pull_request:
    branches: [master]

jobs:
  lint-php:
    name: PHP Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the git repository
        uses: actions/checkout@v2

      - name: PHP Setup
        uses: shivammathur/setup-php@v2
        with:
          php-version: 7.4

      - name: Install composer packages
        run: composer install --no-progress

      - name: Check for PHP Errors
        run: composer lint:php

  phpcs_check:
    name: PHPCS Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the git repository
        uses: actions/checkout@v2

      - name: PHP Setup
        uses: shivammathur/setup-php@v2
        with:
          php-version: 7.4

      - name: Install composer packages
        run: composer install --no-progress

      - name: Check WP Coding Standards
        run: composer lint:wpcs

  lint-css:
    name: Lint SCSS
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the git repository
        uses: actions/checkout@v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: pnpm install
        run: pnpm install

      - name: Lint JS
        run: pnpm lint:scss

  lint-js:
    name: Lint JS
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the git repository
        uses: actions/checkout@v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: pnpm install
        run: pnpm install

      - name: Lint JS
        run: pnpm run lint:js
